<div class="controls">
  <label>
    Number of cleaning tasks:
    <input type="number" id="taskCount" min="3" max="20" value="10" />
  </label>

  <label>
    Start week on:
    <select id="weekStart">
      <option value="Mon" selected>Monday</option>
      <option value="Sun">Sunday</option>
    </select>
  </label>
</div>
